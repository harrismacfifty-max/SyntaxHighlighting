name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build classes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Compile main classes
        run: ./gradlew classes

  test:
    name: Run JUnit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

  format:
    name: Check formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run Spotless check
        run: ./gradlew spotlessCheck